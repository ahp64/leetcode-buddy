<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LeetCode Buddy Streak</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
</head>
<body>
  <main>
    <header>
      <div id="flame" class="flame">🔥</div>
      <div class="streak-number" id="streak-number">–</div>
      <div class="streak-label" id="streak-label">loading…</div>
      <div class="banner" id="banner" hidden></div>
      <div class="hint" id="readonly-note" hidden></div>
    </header>

    <section id="members-section">
      <h2>Today <span class="date" id="today-date"></span></h2>
      <div id="members"></div>
      <p class="hint" id="solo-hint" hidden>
        A streak needs a buddy — add at least one more person below. If
        <em>either</em> of you misses a day, the streak dies for
        <em>everyone</em>.
      </p>
    </section>

    <section id="add-section">
      <h2>Add a person</h2>
      <form id="add-form" class="card">
        <div class="grid">
          <label>LeetCode username *
            <input name="leetcodeUsername" required placeholder="e.g. lee215" autocomplete="off" />
          </label>
          <label>Display name
            <input name="name" placeholder="defaults to username" autocomplete="off" />
          </label>
          <label>Email
            <input name="email" type="email" placeholder="for email reminders" />
          </label>
          <label>Phone
            <input name="phone" type="tel" placeholder="+1555… for text reminders" />
          </label>
        </div>
        <div class="toggles">
          <label class="toggle"><input type="checkbox" name="notifyEmail" checked /> Email reminders</label>
          <label class="toggle"><input type="checkbox" name="notifySms" /> Text reminders</label>
        </div>
        <button type="submit" id="add-btn">Add to streak</button>
        <p class="form-error" id="add-error" hidden></p>
      </form>
    </section>

    <section id="settings-section">
      <h2>Reminders &amp; settings</h2>
      <div class="card" id="settings-card">
        <p class="channel-status" id="channel-status"></p>
        <div class="grid">
          <label>Timezone
            <input id="tz-input" placeholder="e.g. America/Chicago" />
          </label>
          <label>Reminder hours (0–23, comma separated)
            <input id="hours-input" placeholder="e.g. 12, 18, 21" />
          </label>
        </div>
        <div class="settings-actions">
          <button id="save-settings">Save settings</button>
          <button id="remind-now" class="secondary">Send reminders now</button>
        </div>
        <p class="form-error" id="settings-msg" hidden></p>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
