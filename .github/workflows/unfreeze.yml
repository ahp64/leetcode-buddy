# The "Unfreeze streak" button: Actions tab → Unfreeze streak → Run workflow
# (the dashboard links straight here, or dispatches it via the API when you
# connect a token). Ends the freeze immediately — daily solves are required
# again starting today — and redeploys the dashboard.
#
# Everything runs in one job so there's only a single runner startup: the
# scheduled streak.yml still owns the hourly rebuild, but freeze/unfreeze
# inline the same build+deploy steps to shave the second cold job.
name: Unfreeze streak

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  unfreeze:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Remove freeze
        run: node freeze.js unfreeze

      - name: Commit freeze.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add freeze.json
          git diff --cached --quiet || { git commit -m "Unfreeze streak"; git push; }

      - name: Restore config from secret
        env:
          BUDDY_CONFIG: ${{ secrets.BUDDY_CONFIG }}
        run: |
          mkdir -p data
          [ -n "$BUDDY_CONFIG" ] && printf '%s' "$BUDDY_CONFIG" > data/db.json || true

      - name: Build dashboard
        run: node build-status.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
