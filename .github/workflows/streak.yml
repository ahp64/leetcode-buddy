# Hourly streak check: rebuilds the GitHub Pages dashboard every run, and
# sends reminders when the current hour (in the group's timezone) is one of
# the reminder hours in config.json — remind.js --if-scheduled makes that
# call, so UTC/DST conversion never needs to live in this file.
#
# Also callable from manage.yml (workflow_call) so the dashboard refreshes
# immediately after adding/removing a buddy.
#
# Caveats of GitHub's scheduler: runs can lag the cron time by ~15 minutes,
# and schedules are paused automatically after 60 days without repo activity
# (re-enable from the Actions tab or push a commit).
name: Streak check & dashboard

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  streak:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Always build from latest main: when called from manage.yml, the
      # triggering sha predates the config.json commit that run just pushed.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Members/settings come from the committed config.json. Contact info
      # (emails/phones/toggles) never enters the repo — it comes from the
      # CONTACTS secret, editable under Settings → Secrets → Actions.
      - name: Restore contacts from secret
        env:
          CONTACTS: ${{ secrets.CONTACTS }}
        run: |
          mkdir -p data
          if [ -z "$CONTACTS" ]; then
            echo "::notice::No CONTACTS secret set — reminders will log to this console instead of emailing/texting. See README."
          else
            printf '%s' "$CONTACTS" > data/contacts.json
          fi

      - name: Send reminders (only at configured local hours)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
        run: node remind.js --if-scheduled

      - name: Build dashboard
        run: node build-status.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
