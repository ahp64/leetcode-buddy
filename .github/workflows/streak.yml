# Streak check every 15 minutes: rebuilds the GitHub Pages dashboard every
# run, and sends reminders when the current hour (in the group's timezone)
# is one of the reminder hours in config.json — remind.js --if-scheduled
# makes that call, so UTC/DST conversion never needs to live in this file.
#
# Caveats of GitHub's scheduler: runs can lag the cron time by several
# minutes (more under high platform load, when GitHub may also skip a
# run), and schedules are paused automatically after 60 days without repo
# activity (re-enable from the Actions tab or push a commit). 15 minutes
# is a deliberate choice above GitHub's 5-minute floor, which is throttled
# more aggressively.
name: Streak check & dashboard

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  streak:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # ref main: when called from freeze/unfreeze, the triggering sha
      # predates the freeze.json commit that run just pushed.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # The whole group config (members, contacts, timezone, hours, freeze)
      # lives in the BUDDY_CONFIG secret — never in the repo. Edit it under
      # Settings → Secrets and variables → Actions.
      - name: Restore config from secret
        env:
          BUDDY_CONFIG: ${{ secrets.BUDDY_CONFIG }}
        run: |
          mkdir -p data
          if [ -z "$BUDDY_CONFIG" ]; then
            echo "::notice::No BUDDY_CONFIG secret set — dashboard will be empty. See the README for the setup steps."
          else
            printf '%s' "$BUDDY_CONFIG" > data/db.json
          fi

      - name: Send reminders (only at configured local hours)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_CONTENT_SID_SELF: ${{ secrets.TWILIO_CONTENT_SID_SELF }}
          TWILIO_CONTENT_SID_BUDDY: ${{ secrets.TWILIO_CONTENT_SID_BUDDY }}
          TWILIO_CONTENT_SID_TEST: ${{ secrets.TWILIO_CONTENT_SID_TEST }}
        run: node remind.js --if-scheduled

      - name: Build dashboard
        run: node build-status.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
